# Example override file for Step-3.5-Flash SFT.
# Values here are merged on top of step3_flash_sft_config() at runtime.
# Uncomment and edit fields as needed for your cluster / dataset.

model:
  # Recommended for 8 nodes × 8 GPUs (64 total):
  #   TP=1, PP=4, EP=16  →  18 experts per EP rank
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 4
  expert_model_parallel_size: 16
  seq_length: 4096

train:
  train_iters: 1000
  global_batch_size: 128
  micro_batch_size: 1

optimizer:
  max_lr: 5.0e-6
  min_lr: 5.0e-6

scheduler:
  lr_warmup_iters: 50

logger:
  log_interval: 1

ddp:
  grad_reduce_in_fp32: true

rng:
  seed: 1234
